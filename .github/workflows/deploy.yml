name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate og-image PNG
        run: npm install --no-save sharp && node scripts/generate-og-image.mjs

      - name: Build
        env:
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_FORMSPREE_ENDPOINT: ${{ secrets.VITE_FORMSPREE_ENDPOINT }}
        run: npm run build

      - name: Copy static pages to dist
        run: |
          mkdir -p dist/products dist/shop dist/custom-design dist/web-design dist/websites
          cp -f dist/index.html dist/products/index.html
          cp -f dist/index.html dist/shop/index.html
          cp -f dist/index.html dist/custom-design/index.html
          cp -f dist/index.html dist/web-design/index.html
          cp -f dist/index.html dist/websites/index.html
          cp -f website/about-christopher.html dist/ 2>/dev/null || true
          cp -f clients/website-llc/website-llc.html dist/ 2>/dev/null || true
          cp -f projects/restaurant-demo.html dist/ 2>/dev/null || true
          cp -f sitemap.xml dist/ 2>/dev/null || true
          cp -r projects dist/projects 2>/dev/null || true
          cp -r service-areas dist/service-areas 2>/dev/null || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.auralisdigital.net
