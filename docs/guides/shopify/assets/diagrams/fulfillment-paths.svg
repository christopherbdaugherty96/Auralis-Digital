<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" font-family="Arial, 'DejaVu Sans', Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#000000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1800" height="1000" fill="#FFFFFF"/>

  <text x="900" y="70" font-size="40" font-weight="bold" text-anchor="middle" fill="#000000">Three common examples of getting an order to the customer</text>

  <!-- order placed -->
  <rect x="700" y="150" width="400" height="130" rx="16" fill="#EEEEEE" stroke="#000000" stroke-width="5"/>
  <text x="900" y="230" font-size="34" font-weight="bold" text-anchor="middle" fill="#000000">Order placed</text>

  <path d="M900,280 L900,330 L300,330 L300,400" fill="none" stroke="#000000" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M900,280 L900,400" fill="none" stroke="#000000" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M900,280 L900,330 L1500,330 L1500,400" fill="none" stroke="#000000" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- three paths -->
  <rect x="90" y="410" width="420" height="380" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="5"/>
  <text x="300" y="475" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">Self-fulfilled</text>
  <text x="300" y="515" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">physical product</text>
  <line x1="140" y1="545" x2="460" y2="545" stroke="#CCCCCC" stroke-width="2"/>
  <text x="300" y="605" font-size="28" text-anchor="middle" fill="#000000">You keep stock</text>
  <text x="300" y="665" font-size="28" text-anchor="middle" fill="#000000">You pack it</text>
  <text x="300" y="725" font-size="28" text-anchor="middle" fill="#000000">You ship it</text>

  <rect x="690" y="410" width="420" height="380" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="5"/>
  <text x="900" y="475" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">Print-on-demand</text>
  <text x="900" y="515" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">(such as Printify)</text>
  <line x1="740" y1="545" x2="1060" y2="545" stroke="#CCCCCC" stroke-width="2"/>
  <text x="900" y="605" font-size="28" text-anchor="middle" fill="#000000">Partner prints it</text>
  <text x="900" y="665" font-size="28" text-anchor="middle" fill="#000000">Partner ships it</text>
  <text x="900" y="725" font-size="28" text-anchor="middle" fill="#000000">You are charged per order</text>

  <rect x="1290" y="410" width="420" height="380" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="5"/>
  <text x="1500" y="475" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">Digital product</text>
  <text x="1500" y="515" font-size="32" font-weight="bold" text-anchor="middle" fill="#000000">(file or download)</text>
  <line x1="1340" y1="545" x2="1660" y2="545" stroke="#CCCCCC" stroke-width="2"/>
  <text x="1500" y="605" font-size="28" text-anchor="middle" fill="#000000">No physical shipping</text>
  <text x="1500" y="665" font-size="28" text-anchor="middle" fill="#000000">Delivered as a download</text>
  <text x="1500" y="725" font-size="28" text-anchor="middle" fill="#000000">Often needs an app</text>

  <!-- note -->
  <rect x="90" y="850" width="1620" height="100" rx="16" fill="#EEEEEE" stroke="#000000" stroke-width="4"/>
  <text x="900" y="912" font-size="28" text-anchor="middle" fill="#000000">These are three common examples; Chapter 7 also covers resale, services, and commissions.</text>
</svg>
