<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" font-family="Arial, 'DejaVu Sans', Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#000000"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1800" height="1000" fill="#FFFFFF"/>

  <text x="900" y="70" font-size="40" font-weight="bold" text-anchor="middle" fill="#000000">Two sides of the same store</text>

  <!-- actors -->
  <rect x="180" y="150" width="520" height="110" rx="16" fill="#EEEEEE" stroke="#000000" stroke-width="4"/>
  <text x="440" y="220" font-size="34" font-weight="bold" text-anchor="middle" fill="#000000">Customer</text>

  <rect x="1100" y="150" width="520" height="110" rx="16" fill="#EEEEEE" stroke="#000000" stroke-width="4"/>
  <text x="1360" y="220" font-size="34" font-weight="bold" text-anchor="middle" fill="#000000">Merchant (you)</text>

  <path d="M440,260 L440,360" fill="none" stroke="#000000" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1360,260 L1360,360" fill="none" stroke="#000000" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- storefront -->
  <rect x="180" y="370" width="520" height="470" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="5"/>
  <text x="440" y="440" font-size="36" font-weight="bold" text-anchor="middle" fill="#000000">Storefront</text>
  <text x="440" y="485" font-size="27" text-anchor="middle" fill="#333333">what customers use</text>
  <line x1="230" y1="520" x2="650" y2="520" stroke="#CCCCCC" stroke-width="2"/>
  <text x="440" y="585" font-size="30" text-anchor="middle" fill="#000000">Browse products</text>
  <text x="440" y="655" font-size="30" text-anchor="middle" fill="#000000">Add to cart</text>
  <text x="440" y="725" font-size="30" text-anchor="middle" fill="#000000">Check out and pay</text>
  <text x="440" y="795" font-size="30" text-anchor="middle" fill="#000000">Read your policies</text>

  <!-- admin -->
  <rect x="1100" y="370" width="520" height="470" rx="16" fill="#FFFFFF" stroke="#000000" stroke-width="5"/>
  <text x="1360" y="440" font-size="36" font-weight="bold" text-anchor="middle" fill="#000000">Shopify admin</text>
  <text x="1360" y="485" font-size="27" text-anchor="middle" fill="#333333">what you manage</text>
  <line x1="1150" y1="520" x2="1570" y2="520" stroke="#CCCCCC" stroke-width="2"/>
  <text x="1360" y="585" font-size="30" text-anchor="middle" fill="#000000">Settings</text>
  <text x="1360" y="655" font-size="30" text-anchor="middle" fill="#000000">Products and orders</text>
  <text x="1360" y="725" font-size="30" text-anchor="middle" fill="#000000">Payments and payouts</text>
  <text x="1360" y="795" font-size="30" text-anchor="middle" fill="#000000">Store policies</text>

  <text x="900" y="605" font-size="30" font-weight="bold" text-anchor="middle" fill="#000000">Same store,</text>
  <text x="900" y="650" font-size="30" font-weight="bold" text-anchor="middle" fill="#000000">two views</text>

  <!-- note -->
  <rect x="180" y="880" width="1440" height="90" rx="16" fill="#EEEEEE" stroke="#000000" stroke-width="4"/>
  <text x="900" y="937" font-size="28" text-anchor="middle" fill="#000000">Customers never see the admin; you do most setup work there, not on the storefront.</text>
</svg>
